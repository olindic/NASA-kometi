<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asteroids</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #333;
            padding: 8px 12px;
            text-align: center;
        }

        th {
            background-color: #444;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        form {
            margin-top: 30px;
        }

        input[type="date"] {
            padding: 6px;
            margin: 5px;
        }

        button {
            padding: 8px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Near-Earth Asteroids</h1>

    <form method="POST" action="/asteroids">
        <p>Search for asteroids by date range:</p>
        <input type="date" name="start_date" required>
        <br><br>
        <input type="date" name="end_date" required>
        <br><br>
        <button type="submit">Search</button>
    </form>

    {% if asteroids %}
    <table>
        <thead>
            <tr>
                <th style="color: rgb(127, 253, 159);">Name</th>
                <th style="color: rgb(127, 253, 159);">Date</th>
                <th style="color: rgb(212, 31, 76);">Hazardous</th>
            </tr>
        </thead>
        <tbody>
            {% for asteroid in asteroids %}
            <tr>
                <td>{{ asteroid.name }}</td>
                <td>{{ asteroid.date }}</td>
                <td>{{ asteroid.nevaren }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}

</body>
</html>
